<a routerLink="/favoriten" routerLinkActive="active-link" class="header-nav-link">Favoriten</a>
<div class="favorites-page-container">

  
  <div class="profile-header-section">
    <div class="profile-avatar-wrapper">
      <svg class="profile-avatar-icon" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
      </svg>
    </div>
    <div class="profile-welcome-text">
      <h2>Dein Profil ist aktiv</h2>
      <p>Hier findest du deine gemerkten Getränke, erstellten Boards und Lieblingsmarken.</p>
      <a href="#" class="profile-link-action">Profil-Einstellungen verwalten &rarr;</a>
    </div>
  </div>

  <div class="favorites-tabs-bar">
    <div class="tabs-left">
      <button class="tab-btn active">Alle</button>
      <button class="tab-btn">Von dir erstellt</button>
      <button class="tab-btn">Lieblings-Marken</button>
    </div>
    <div class="tabs-right">
      <button class="btn-create-board">
        <span class="plus-sign">+</span> Board erstellen
      </button>
    </div>
  </div>

  <div class="boards-display-grid">
    
    <div class="board-preview-card">
      <div class="board-images-layout">
        <div class="main-preview-box favorite-orange-bg">
          <svg class="heart-icon-center" viewBox="0 0 24 24">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </div>
        <div class="side-previews-column">
          <div class="side-img-box"><img src="images/PortugalRose.avif" alt="Vorschau"></div>
          <div class="side-img-box"><img src="images/SpriteZero.avif" alt="Vorschau"></div>
          <div class="side-img-box"><img src="images/starbucks_hazelnut.avif" alt="Vorschau"></div>
        </div>
      </div>
      <div class="board-meta-info">
        <h3>Favoriten</h3>
        <p>341 Artikel</p>
      </div>
    </div>

    <div class="board-preview-card">
      <div class="board-images-layout">
        <div class="main-preview-box gray-preview-bg">
          <img src="images/nescafe_gold.avif" alt="Hauptartikel">
        </div>
        <div class="side-previews-column">
          <div class="side-img-box"><img src="images/RedBull_Sugarfree_4x0,25L.avif" alt="Vorschau"></div>
          <div class="side-img-box"><img src="images/mullerMilch_AyranMinze.avif" alt="Vorschau"></div>
          <div class="side-img-box"><img src="images/milram_erdbeer.avif" alt="Vorschau"></div>
        </div>
      </div>
      <div class="board-meta-info">
        <h3>Zuletzt gekaufte Artikel</h3>
        <p>24 Artikel</p>
      </div>
    </div>

    <div class="board-preview-card">
      <div class="board-images-layout">
        <div class="main-preview-box gray-preview-bg private-board">
          <span class="lock-status-badge">🔒</span>
          <img src="images/becks.avif" alt="Hauptartikel">
        </div>
        <div class="side-previews-column">
          <div class="side-img-box"><img src="images/jeverfun6.avif" alt="Vorschau"></div>
          <div class="side-img-box"><img src="images/Bitburger.avif" alt="Vorschau"></div>
          <div class="side-img-box"><img src="images/KrombacherPils.avif" alt="Vorschau"></div>
        </div>
      </div>
      <div class="board-meta-info">
        <h3>Lieblings-Board für Bier</h3>
        <p>Dein privates Board</p>
      </div>
    </div>

  </div>
</div>
