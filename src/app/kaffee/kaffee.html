<app-header></app-header>

<main class="content-wrapper">
  <nav class="breadcrumb">Startseite &gt; Kaffee &gt; <strong>Kaffee</strong></nav>
  <h1 class="page-title">Kaffee</h1>

  <div class="filter-bar">
    <button class="filter-btn active">Alle Filter</button>
    <button class="filter-btn">Bohnenkaffee & Espresso</button>
    <button class="filter-btn">Instantkaffee</button>
    <button class="filter-btn">Kaffeekapseln & Pads</button>
    <button class="filter-btn">Kaffeesahne & Kondensmilch</button>
    <button class="filter-btn">Kaffeesirup</button>
  </div>

  <div class="product-grid">
    <div class="product-card" *ngFor="let produkt of produkte">

      <div class="badge-tiefpreis" *ngIf="produkt.badge">
        {{ produkt.badge }}
      </div>

      <img [src]="produkt.Bild || produkt.bild" [alt]="produkt.Name || produkt.name" class="p-img">

      <div class="p-info">

        <p class="brand">
          {{ produkt.marke }}
        </p>

        <p class="name">
          {{ produkt.Name || produkt.name }}
        </p>

        <p class="details">
          {{ produkt.inhalt }} ({{ produkt.verpackung }})
        </p>

        <p class="pfandart">
          {{ produkt.pfandart }}
        </p>

        <p class="pfand">
          zzgl. {{ produkt.pfand }} € Pfand
        </p>

        <div class="card-footer">
          <span class="price">
            {{ produkt.Preis || produkt.preis }} €
          </span>

          <button class="add-btn" (click)="inDenWarenkorb(produkt)">+</button>
        </div>

      </div>

    </div>
  </div>
</main>
